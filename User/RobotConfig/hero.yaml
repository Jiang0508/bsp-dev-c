global_settings:
  monitor_sleep_ms: 1000
modules:
- id: blink_led
  name: BlinkLED
  constructor_args:
    blink_cycle: 250
- id: cmd
  name: CMD
  constructor_args:
    mode: CMD::Mode::CMD_OP_CTRL
    chassis_cmd_topic_name: chassis_cmd
    gimbal_cmd_topic_name: gimbal_cmd
    launcher_cmd_topic_name: launcher_cmd
- id: dr16
  name: DR16
  constructor_args:
    CMD: '@cmd'
    task_stack_depth_uart: 2048
    cmd_data_tp_name: cmd_raw_data_
- id: motor_fric_front_left
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: false
      feedback_id: 516
      can_bus_name: can1
- id: motor_fric_front_right
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: true
      feedback_id: 513
      can_bus_name: can1
- id: motor_fric_back_left
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: false
      feedback_id: 514
      can_bus_name: can1
- id: motor_fric_back_right
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: true
      feedback_id: 515
      can_bus_name: can1
- id: motor_trig
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: false
      feedback_id: 517
      can_bus_name: can2
- id: Launcher
  name: Launcher
  constructor_args:
    motor_fric_front_left: '@&motor_fric_front_left'
    motor_fric_front_right: '@&motor_fric_front_right'
    motor_fric_back_left: '@&motor_fric_back_left'
    motor_fric_back_right: '@&motor_fric_back_right'
    motor_trig: '@&motor_trig'
    cmd: '@&cmd'
    task_stack_depth: 2048
    launcher_param:
      fric1_setpoint_speed: 500.0
      fric2_setpoint_speed: 500.0
      default_bullet_speed: 0.0
      fric_radius: 6.0
      trig_gear_ratio: 19.0
      num_trig_tooth: 6
      trig_freq_: 0.0
    pid_trig_angle:
      k: 1.0
      p: 4000.0
      i: 3000.0
      d: 0.0
      i_limit: 0.0
      out_limit: 2000.0
      cycle: false
    pid_trig_speed:
      k: 1.0
      p: 0.0012
      i: 0.001
      d: 0.0
      i_limit: 1.0
      out_limit: 1.0
      cycle: false
    pid_fric_speed_0:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
    pid_fric_speed_1:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
    pid_fric_speed_2:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
    pid_fric_speed_3:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
  template_args:
    LauncherType: HeroLauncher
    FRIC_NUM: 4
    TRIG_NUM: 1
- id: EventBinder
  name: EventBinder
  constructor_args:
    modules:
    - name: dr16
      module_ref: '@dr16'
    - name: cmd
      module_ref: '@cmd'
    - name: Launcher
      module_ref: '@Launcher'
    event_binding_groups:
    - bindings:
      - source_module: dr16
        source_event: DR16::SwitchPos::DR16_SW_R_POS_MID
        target_module: cmd
        target_event: CMD::Mode::CMD_OP_CTRL
      - source_module: dr16
        source_event: DR16::SwitchPos::DR16_SW_R_POS_BOT
        target_module: cmd
        target_event: CMD::Mode::CMD_OP_CTRL
    - bindings:
      - source_module: dr16
        source_event: DR16::SwitchPos::DR16_SW_R_POS_MID
        target_module: launcher
        target_event: FRICMODE::SAFE
      - source_module: dr16
        source_event: DR16::SwitchPos::DR16_SW_R_POS_BOT
        target_module: launcher
        target_event: FRICMODE::READY
  template_args:
    ChassisType: Omni
