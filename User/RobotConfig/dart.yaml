global_settings:
  monitor_sleep_ms: 1000
modules:
- id: blink_led
  name: BlinkLED
  constructor_args:
    blink_cycle: 250
- id: motor_fric_front_left
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: true
      feedback_id: 516
      can_bus_name: can1
- id: motor_fric_front_right
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: false
      feedback_id: 513
      can_bus_name: can1
- id: motor_fric_back_left
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: true
      feedback_id: 515
      can_bus_name: can1
- id: motor_fric_back_right
  name: RMMotor
  constructor_args:
    param:
      model: RMMotor::Model::MOTOR_M3508
      reverse: false
      feedback_id: 514
      can_bus_name: can1
- id: DartLauncher
  name: DartLauncher
  constructor_args:
    motor_fric_front_left: '@&motor_fric_front_left'
    motor_fric_front_right: '@&motor_fric_front_right'
    motor_fric_back_left: '@&motor_fric_back_left'
    motor_fric_back_right: '@&motor_fric_back_right'
    task_stack_depth: 2048
    fric1_setpoint_speed: 6300.0
    fric2_setpoint_speed: 4200.0
    fric_speed_pid_0:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
    fric_speed_pid_1:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
    fric_speed_pid_2:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
    fric_speed_pid_3:
      k: 1.0
      p: 0.002
      i: 0.0
      d: 0.0
      i_limit: 0.0
      out_limit: 1.0
      cycle: false
  template_args:
    MotorType: RMMotor
